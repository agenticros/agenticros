  <text class="text" x="536" y="696">Interpret goal -> choose tools -> observe</text>
  <text class="text" x="536" y="720">state -> revise plan -> issue safe actions</text>
  <text class="small" x="536" y="748">Tool calls are routed through AgenticROS.</text>

