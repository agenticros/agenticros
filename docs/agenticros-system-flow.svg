<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">AgenticROS system flow</title>
  <desc id="desc">System flow showing chat channels and AI agent platforms connecting through AgenticROS to ROS, RealSense, NVIDIA VSLAM, robot skills, motors, batteries, and robot missions.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 800 42px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #16212f; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526071; }
      .section { font: 800 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #243244; }
      .label { font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172231; }
      .text { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #435166; }
      .small { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5b6a7f; }
      .tiny { font: 700 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5b6a7f; }
      .panel { fill: #ffffff; stroke: #d6e0eb; stroke-width: 1.4; }
      .tile { fill: #ffffff; stroke: #c7d2df; stroke-width: 1.5; }
      .messaging { fill: #eaf6ff; stroke: #68a5d9; }
      .agent { fill: #edf4ff; stroke: #7198d8; }
      .core { fill: #fff6d8; stroke: #d6a333; }
      .robot { fill: #eaf8ef; stroke: #5ca976; }
      .device { fill: #fff0ec; stroke: #cd7a67; }
      .skill { fill: #f2ecff; stroke: #8d70ca; }
      .nvidia { fill: #eef9df; stroke: #76b900; }
      .line { fill: none; stroke: #657386; stroke-width: 2.3; }
      .line-blue { fill: none; stroke: #266d9f; stroke-width: 3; }
      .line-green { fill: none; stroke: #4f9568; stroke-width: 2.8; }
      .line-purple { fill: none; stroke: #7a63b8; stroke-width: 2.8; }
      .dash { stroke-dasharray: 8 8; }
      .shadow { filter: drop-shadow(0 10px 20px rgba(22,33,47,0.08)); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#657386"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#266d9f"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#4f9568"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7a63b8"/>
    </marker>
    <linearGradient id="agenticrosGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7dc"/>
      <stop offset="0.52" stop-color="#fdf0c3"/>
      <stop offset="1" stop-color="#f7e2a2"/>
    </linearGradient>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1100"/>
  <text class="title" x="70" y="72">AgenticROS System Flow</text>
  <text class="subtitle" x="70" y="104">Messages become agent plans; AgenticROS turns those plans into perception, skills, and safe ROS-powered robot action.</text>

